# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: data-integration-metrics-platform
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      # Optional — app uses in-memory mock data if these are not set
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
